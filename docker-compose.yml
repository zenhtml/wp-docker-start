services:
  wordpress:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-wordpress
    restart: unless-stopped
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: ${DB_HOST}:${DB_PORT}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      WP_TABLE_PREFIX: ${WP_TABLE_PREFIX}
      WP_DEBUG: ${WP_DEBUG}
      WP_DEBUG_LOG: ${WP_DEBUG_LOG}
      WP_DEBUG_DISPLAY: ${WP_DEBUG_DISPLAY}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT}
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE}
      PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE}
    volumes:
      - wordpress_core:/var/www/html
      - ./wordpress/wp-config.php:/var/www/html/wp-config.php:ro
      - ./wordpress/wp-content:/var/www/html/wp-content
      - php_logs:/var/log/php
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wp-network

  mysql:
    image: mariadb:11
    container_name: ${COMPOSE_PROJECT_NAME}-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_EXPOSE_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wp-network

  wpcli:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-wpcli
    environment:
      WORDPRESS_DB_HOST: ${DB_HOST}:${DB_PORT}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - wordpress_core:/var/www/html
      - ./wordpress/wp-config.php:/var/www/html/wp-config.php:ro
      - ./wordpress/wp-content:/var/www/html/wp-content
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wp-network
    user: "33:33"
    entrypoint: ["wp", "--allow-root"]

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ${COMPOSE_PROJECT_NAME}-pma
    restart: unless-stopped
    profiles:
      - pma
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - wp-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ${COMPOSE_PROJECT_NAME}-mailhog
    restart: unless-stopped
    profiles:
      - mail
    ports:
      - "${MAIL_PORT:-8025}:8025"
      - "1025:1025"
    networks:
      - wp-network

volumes:
  wordpress_core:
  mysql_data:
  php_logs:

networks:
  wp-network:
    driver: bridge
